<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <!-- font-awesome 라이브러리 가져오기 -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <!-- Bootstrap CSS 디자인, 레이아웃 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <!-- Bootstrap Js 모달, 드롭다운 -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <form>
            <div class="container mt-3" style="width: 500px">
                <h2><i class="fa-solid fa-pen-to-square"></i> 새 글쓰기</h2>
                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input type="text" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">작성자</label>
                    <input type="text" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">내용</label>
                    <textarea class="form-control" rows="6"></textarea>
                </div>

                <div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check"></i> 확인
                    </button>
                    <button type="reset" class="btn btn-primary">
                        <i class="fa-solid fa-arrow-rotate-left"></i> 취소
                    </button>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-list-check"></i> 목록
                    </button>
                </div>
            </div>
        </form>
    </body>
</html>
