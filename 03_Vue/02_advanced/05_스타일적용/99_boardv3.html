<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 게시판 목록</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            .edit-title-input {
                width: 100%;
                height: 28px;
                box-sizing: border-box;
                margin-bottom: 6px;
            }

            .edit-content-textarea {
                width: 100%;
                height: 80px;
                box-sizing: border-box;
                resize: none;
                margin-bottom: 8px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <h1>📌 게시판 목록 v3</h1>

            <div style="text-align: center">
                <input
                    type="text"
                    v-model="newTitle"
                    placeholder="새 게시글 제목"
                />
                <input
                    type="text"
                    v-model="newContent"
                    placeholder="새 게시글 내용"
                />
                <button @click="addPost">작성</button>
            </div>

            <!-- 아래의 목록을 완성하세요 -->
            <ul>
                <template v-for="(post, index) in reversedPosts" :key="post.no">
                    <li
                        class="post-item"
                        @click="viewContent(post)"
                        :class="{ active: selectedPost === post }"
                    >
                        {{post.no}}. {{post.title}} {{selectedPost === post ?
                        '▲' : '▼'}}
                    </li>

                    <li v-if="selectedPost === post" class="post-content">
                        <template v-if="editingPost === post">
                            <div class="row">
                                <input
                                    type="text"
                                    v-model="editTitle"
                                    class="edit-title-input"
                                />
                                <textarea
                                    v-model="editContent"
                                    class="edit-content-textarea"
                                ></textarea>
                            </div>

                            <button @click="saveEdit">저장</button>
                            <button @click="cancelEdit">취소</button>
                        </template>

                        <template v-else>
                            <h2>{{ post.title}}</h2>
                            <p>{{ post.content }}</p>
                            <button @click="startEdit(post)">수정</button>
                            <button @click="deletePost(post.no)">삭제</button>
                            <button @click="selectedPost = null">닫기</button>
                        </template>
                    </li>
                </template>
            </ul>
        </div>

        <script>
            const { createApp, ref, computed } = Vue;

            createApp({
                setup() {
                    const posts = ref([
                        {
                            no: 1,
                            title: 'Vue.js 기초 배우기',
                            content:
                                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
                        },
                        {
                            no: 2,
                            title: '자바스크립트 ES6 문법',
                            content:
                                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
                        },
                        {
                            no: 3,
                            title: 'Node.js와 Express',
                            content:
                                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
                        },
                        {
                            no: 4,
                            title: 'MongoDB 기본 개념',
                            content:
                                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
                        },
                        {
                            no: 5,
                            title: '프론트엔드와 백엔드의 차이',
                            content:
                                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
                        },
                        {
                            no: 6,
                            title: '비동기 프로그래밍',
                            content:
                                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
                        },
                        {
                            no: 7,
                            title: 'Vue Router 사용법',
                            content:
                                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
                        },
                        {
                            no: 8,
                            title: '컴포넌트 기반 개발',
                            content:
                                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
                        },
                        {
                            no: 9,
                            title: 'CSS와 SCSS 차이점',
                            content:
                                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
                        },
                        {
                            no: 10,
                            title: 'Git과 GitHub 사용법',
                            content:
                                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
                        },
                    ]);

                    // 아래에 화면처럼 동작하도록 구현해보세요
                    const selectedPost = ref(null);
                    const newTitle = ref('');
                    const newContent = ref('');
                    const editingPost = ref(null);
                    const editTitle = ref('');
                    const editContent = ref('');

                    const reversedPosts = computed(() => {
                        return [...posts.value].reverse();
                    });

                    const viewContent = (post) => {
                        selectedPost.value =
                            selectedPost.value === post ? null : post;
                    };

                    const addPost = () => {
                        posts.value.push({
                            no: posts.value.length + 1,
                            title: newTitle.value,
                            content: newContent.value,
                        });

                        newTitle.value = '';
                        newContent.value = '';
                    };

                    // 수정
                    const startEdit = (post) => {
                        editingPost.value = post;
                        editTitle.value = post.title;
                        editContent.value = post.content;
                    };

                    const saveEdit = () => {
                        if (
                            !editTitle.value.trim() ||
                            !editContent.value.trim()
                        )
                            return;

                        selectedPost.value = editingPost.value;

                        editingPost.value.title = editTitle.value;
                        editingPost.value.content = editContent.value;

                        editingPost.value = null;
                        editTitle.value = '';
                        editContent.value = '';
                    };

                    const cancelEdit = () => {
                        editingPost.value = null;
                        editTitle.value = '';
                        editContent.value = '';
                    };

                    // 삭제
                    const deletePost = (no) => {
                        const isDelete = confirm('정말로 삭제하시겠습니까?');

                        if (!isDelete) return;

                        posts.value = posts.value.filter(
                            (post) => post.no !== no,
                        );

                        posts.value.forEach((post, index) => {
                            post.no = index + 1;
                        });

                        if (
                            selectedPost.value &&
                            selectedPost.value.no === no
                        ) {
                            selectedPost.value = null;
                        }

                        if (editingPost.value && editingPost.value.no === no) {
                            editingPost.value = null;
                            editTitle.value = '';
                            editContent.value = '';
                        }
                    };

                    return {
                        posts,
                        reversedPosts,
                        selectedPost,
                        newTitle,
                        newContent,
                        editingPost,
                        editTitle,
                        editContent,
                        viewContent,
                        addPost,
                        startEdit,
                        saveEdit,
                        cancelEdit,
                        deletePost,
                    };
                },
            }).mount('#app');
        </script>

        <style>
            h1 {
                text-align: center;
                color: #333;
            }
            ul {
                list-style-type: none;
                padding: 0;
            }
            .post-item {
                cursor: pointer;
                padding: 15px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-weight: bold;
            }
            .post-item:hover {
                background: #f4f4f4;
            }
            .post-content {
                margin-top: 20px;
                padding: 15px;
                border: 1px solid #ddd;
                border-radius: 5px;
                background: #fff;
            }
            button {
                margin-top: 10px;
                padding: 5px 10px;
                border: none;
                background: #ff6b6b;
                color: white;
                cursor: pointer;
                border-radius: 3px;
            }
            button:hover {
                background: #ff4f4f;
            }

            .arrow {
                font-size: 0.8em;
                color: #888;
            }

            .post-title {
                font-size: 14px;
                color: #333;
            }
        </style>
    </body>
</html>
