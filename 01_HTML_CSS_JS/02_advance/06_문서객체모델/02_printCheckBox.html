<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>
        <script>
            window.onload = function () {
                const button = document.getElementById('btn');

                button.onclick = function () {
                    const foods = document.querySelectorAll(
                        'input[name="food"]:checked',
                    );
                    let checkList = [];

                    foods.forEach((food) => {
                        checkList.push(food.value);
                    });

                    alert(checkList.join(', '));
                };
            };
        </script>
    </head>

    <body>
        <form>
            <div>
                좋아하는 음식은?
                <label>
                    <input type="checkbox" name="food" value="라면" />
                    라면</label
                >
                <label>
                    <input type="checkbox" name="food" value="만두" />
                    만두</label
                >
                <label>
                    <input type="checkbox" name="food" value="불고기" />
                    불고기</label
                >
                <input id="btn" type="button" value="전송" />
            </div>
        </form>
    </body>
</html>
